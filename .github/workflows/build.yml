name: Build

on:
  push:
    branches: [master, feature/monthly-league]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle
      - name: Build and test
        run: ./gradlew build --no-daemon
